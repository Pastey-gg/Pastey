name: Update Submodules

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout parent repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Update submodules to latest remote commits
        run: |
          git submodule update --init --recursive --remote --merge

      - name: Commit and push updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@://github.com"
            
            git add .
            git commit -m "Update Front/Back end submodules"
            git push
          else
            echo "No submodule updates found. Skipping commit."
          fi